name: sp_alert

on:
  schedule:
    # - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sp_alert:
    runs-on: macOS-latest

    env:
      R_TELEGRAM_BOT_SPALERT_BOT: ${{ secrets.R_TELEGRAM_BOT_SPALERT_BOT }}
      SPECIESLINK_API_KEY: ${{ secrets.SPECIESLINK_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          install.packages(c("telegram","dplyr","readr","stringr","glue","purrr","httr2"))
        shell: Rscript {0}

      - name: Run script
        run: Rscript telegram.R

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add dados/characidium_database.csv
          git diff --cached --quiet || git commit -m "Update data"
          git push
